<svg viewBox="0 0 620 200" xmlns="http://www.w3.org/2000/svg">

  <!-- Árbol sobre 盆 -->
  <g transform="translate(35,28)">
    <rect x="-1.5" y="22" width="3" height="13" rx="1.5" fill="#6b4c15"/>
    <path d="M0,22 Q-8,14 -11,6"  stroke="#5c3f10" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M0,22 Q8,13 11,5"    stroke="#5c3f10" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M0,22 Q0,14 0,8"     stroke="#5c3f10" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <circle cx="0"   cy="14" r="9" fill="#3a5c0e"/>
    <circle cx="-11" cy="11" r="7" fill="#2d4e0b"/>
    <circle cx="11"  cy="10" r="8" fill="#3a5c0e"/>
    <circle cx="-5"  cy="4"  r="6" fill="#4a6e12"/>
    <circle cx="5"   cy="3"  r="6" fill="#537c14"/>
    <circle cx="0"   cy="0"  r="4.5" fill="#5e8a18"/>
  </g>

  <!-- Árbol sobre 栽 -->
  <g transform="translate(104,28)">
    <rect x="-1.5" y="22" width="3" height="13" rx="1.5" fill="#6b4c15"/>
    <path d="M0,22 Q-8,14 -11,6"  stroke="#5c3f10" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M0,22 Q8,13 11,5"    stroke="#5c3f10" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M0,22 Q0,14 0,8"     stroke="#5c3f10" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <circle cx="0"   cy="14" r="9" fill="#3a5c0e"/>
    <circle cx="-11" cy="11" r="7" fill="#2d4e0b"/>
    <circle cx="11"  cy="10" r="8" fill="#3a5c0e"/>
    <circle cx="-5"  cy="4"  r="6" fill="#4a6e12"/>
    <circle cx="5"   cy="3"  r="6" fill="#537c14"/>
    <circle cx="0"   cy="0"  r="4.5" fill="#5e8a18"/>
  </g>

  <!-- Fila 1: 盆 栽 -->
  <text x="5"  y="115" font-size="60" font-weight="700"
        font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',Georgia,serif"
        fill="#8b6b2a">盆</text>
  <text x="74" y="115" font-size="60" font-weight="700"
        font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',Georgia,serif"
        fill="#8b6b2a">栽</text>

  <!-- Fila 2: 看 板 -->
  <text x="5"  y="182" font-size="60" font-weight="700"
        font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',Georgia,serif"
        fill="#2d5090">看</text>
  <text x="74" y="182" font-size="60" font-weight="700"
        font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',Georgia,serif"
        fill="#2d5090">板</text>

  <!-- kanbanbonsai -->
  <text x="148" y="182"
        font-size="66"
        font-family="Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="300"
        letter-spacing="-0.5">
    <tspan fill="#8c96aa">kanban</tspan><tspan fill="#6aaa28">bonsai</tspan>
  </text>

